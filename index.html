<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1a1a2e" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Chores" />
  <link rel="manifest" href="manifest.json" />
  <title>Chore Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f1a;
      --surface: #1a1a2e;
      --surface2: #24243e;
      --accent: #e8c547;
      --accent2: #ff6b6b;
      --text: #f0ede6;
      --muted: #7a7a9a;
      --done-bg: #1e2e1e;
      --done-accent: #5cb85c;
      --radius: 16px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      padding: 0;
      overflow-x: hidden;
    }

    /* Background texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 20% 0%, rgba(232,197,71,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(255,107,107,0.06) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .app { position: relative; z-index: 1; max-width: 480px; margin: 0 auto; padding: 0 0 120px; }

    /* HEADER */
    .header {
      padding: 52px 24px 20px;
      position: sticky;
      top: 0;
      background: linear-gradient(to bottom, var(--bg) 70%, transparent);
      z-index: 10;
    }

    .header-top { display: flex; align-items: flex-start; justify-content: space-between; }

    .title {
      font-family: 'DM Serif Display', serif;
      font-size: 2.4rem;
      line-height: 1.05;
      letter-spacing: -0.5px;
    }
    .title span { color: var(--accent); font-style: italic; }

    .date-pill {
      background: var(--surface2);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 0.72rem;
      color: var(--muted);
      font-weight: 500;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      white-space: nowrap;
      margin-top: 6px;
    }

    .progress-bar-wrap {
      margin-top: 18px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .progress-bar-bg {
      flex: 1;
      height: 5px;
      background: var(--surface2);
      border-radius: 999px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), #f7a440);
      border-radius: 999px;
      transition: width 0.5s cubic-bezier(.4,0,.2,1);
    }
    .progress-label { font-size: 0.75rem; color: var(--muted); min-width: 40px; text-align: right; }

    /* SECTION */
    .section-label {
      padding: 20px 24px 8px;
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* CHORE CARD */
    .chore-list { display: flex; flex-direction: column; gap: 10px; padding: 0 16px; }

    .chore-card {
      background: var(--surface);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: var(--radius);
      padding: 16px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      transition: transform 0.15s, background 0.2s, border-color 0.2s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .chore-card:active { transform: scale(0.975); }
    .chore-card.done {
      background: var(--done-bg);
      border-color: rgba(92,184,92,0.2);
    }

    .chore-icon {
      width: 42px; height: 42px;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem;
      flex-shrink: 0;
      background: var(--surface2);
      transition: background 0.2s;
    }
    .chore-card.done .chore-icon { background: rgba(92,184,92,0.15); }

    .chore-info { flex: 1; min-width: 0; }
    .chore-name {
      font-size: 0.95rem;
      font-weight: 500;
      transition: color 0.2s;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .chore-card.done .chore-name { color: var(--muted); text-decoration: line-through; }
    .chore-last {
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 2px;
    }
    .chore-card.done .chore-last { color: var(--done-accent); }

    .chore-check {
      width: 26px; height: 26px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.15);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s, border-color 0.2s;
      font-size: 0.85rem;
    }
    .chore-card.done .chore-check {
      background: var(--done-accent);
      border-color: var(--done-accent);
    }

    /* Delete button (long-press hint) */
    .chore-delete {
      display: none;
      background: rgba(255,107,107,0.15);
      border: none;
      color: var(--accent2);
      font-size: 1rem;
      width: 32px; height: 32px;
      border-radius: 8px;
      cursor: pointer;
      align-items: center; justify-content: center;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }
    .chore-card:hover .chore-delete,
    .chore-card.edit-mode .chore-delete { display: flex; }

    /* ADD CHORE BOTTOM BAR */
    .add-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      padding: 16px;
      background: linear-gradient(to top, var(--bg) 60%, transparent);
      z-index: 20;
    }
    .add-bar-inner {
      max-width: 480px;
      margin: 0 auto;
      display: flex;
      gap: 10px;
    }
    .add-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      padding: 14px 18px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }
    .add-input:focus { border-color: var(--accent); }
    .add-input::placeholder { color: var(--muted); }

    .add-btn {
      width: 50px; height: 50px;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 14px;
      font-size: 1.5rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.15s, background 0.15s;
      font-weight: 700;
    }
    .add-btn:active { transform: scale(0.92); }

    /* EMPTY STATE */
    .empty {
      text-align: center;
      padding: 60px 24px 0;
      color: var(--muted);
    }
    .empty-icon { font-size: 3rem; margin-bottom: 12px; }
    .empty p { font-size: 0.9rem; line-height: 1.5; }

    /* INSTALL BANNER */
    .install-banner {
      margin: 12px 16px 0;
      background: linear-gradient(135deg, rgba(232,197,71,0.12), rgba(255,107,107,0.08));
      border: 1px solid rgba(232,197,71,0.25);
      border-radius: var(--radius);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 0.82rem;
      color: var(--text);
    }
    .install-banner .icon { font-size: 1.4rem; }
    .install-banner p { flex: 1; line-height: 1.4; }
    .install-banner p strong { color: var(--accent); }
    .install-btn {
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      font-family: 'DM Sans', sans-serif;
    }
    .install-banner.hidden { display: none; }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: var(--surface2);
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--text);
      padding: 10px 20px;
      border-radius: 999px;
      font-size: 0.82rem;
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
      white-space: nowrap;
      z-index: 100;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* Animations */
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .chore-card { animation: slideIn 0.25s ease both; }

    /* Overdue badge */
    .overdue-badge {
      font-size: 0.65rem;
      background: rgba(255,107,107,0.15);
      color: var(--accent2);
      padding: 2px 7px;
      border-radius: 999px;
      margin-left: 6px;
      font-weight: 600;
      vertical-align: middle;
    }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-top">
      <h1 class="title">My <span>Chores</span></h1>
      <div class="date-pill" id="todayDate"></div>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill" style="width:0%"></div></div>
      <div class="progress-label" id="progressLabel">0 / 0</div>
    </div>
  </div>

  <div id="installBanner" class="install-banner hidden">
    <span class="icon">📲</span>
    <p><strong>Add to home screen</strong> to use like an app!</p>
    <button class="install-btn" id="installBtn">Install</button>
  </div>

  <div class="section-label" id="pendingLabel"></div>
  <div class="chore-list" id="choreList"></div>
  <div class="empty hidden" id="emptyState">
    <div class="empty-icon">🧹</div>
    <p>No chores yet.<br>Add one below to get started!</p>
  </div>

  <div class="section-label" id="doneLabel" style="display:none"></div>
  <div class="chore-list" id="doneList"></div>
</div>

<div class="add-bar">
  <div class="add-bar-inner">
    <input class="add-input" id="addInput" type="text" placeholder="Add a new chore…" maxlength="60" />
    <button class="add-btn" id="addBtn" title="Add chore">+</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ─── STATE ───────────────────────────────────────────────────────────
  let chores = JSON.parse(localStorage.getItem('chores') || '[]');

  const DEFAULT_CHORES = [
    { name: 'Vacuum floors', icon: '🧹' },
    { name: 'Do laundry', icon: '👕' },
    { name: 'Wash dishes', icon: '🍽️' },
    { name: 'Clean bathroom', icon: '🚿' },
    { name: 'Take out trash', icon: '🗑️' },
    { name: 'Mop kitchen', icon: '🪣' },
  ];

  if (chores.length === 0) {
    chores = DEFAULT_CHORES.map((c, i) => ({
      id: Date.now() + i,
      name: c.name,
      icon: c.icon,
      done: false,
      lastDone: null,
    }));
    save();
  }

  function save() { localStorage.setItem('chores', JSON.stringify(chores)); }

  // ─── UTILS ───────────────────────────────────────────────────────────
  const ICONS = ['🧹','👕','🍽️','🚿','🗑️','🪣','🪴','🛏️','🧺','🧼','🧽','🪟','🧴','🐾','📦','🔧'];

  function randomIcon() { return ICONS[Math.floor(Math.random() * ICONS.length)]; }

  function formatDate(ts) {
    if (!ts) return 'Never done';
    const d = new Date(ts);
    const today = new Date();
    const diff = Math.floor((today - d) / 86400000);
    if (diff === 0) return 'Done today ✓';
    if (diff === 1) return 'Done yesterday';
    if (diff < 7) return `Done ${diff} days ago`;
    if (diff < 14) return 'Done last week';
    return 'Done ' + d.toLocaleDateString('en-GB', { day:'numeric', month:'short' });
  }

  function isOverdue(ts, days = 7) {
    if (!ts) return true;
    return (Date.now() - ts) > days * 86400000;
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }

  // ─── RENDER ──────────────────────────────────────────────────────────
  function render() {
    const pending = chores.filter(c => !c.done);
    const done    = chores.filter(c => c.done);

    // Progress
    const total = chores.length;
    const doneCount = done.length;
    const pct = total ? Math.round(doneCount / total * 100) : 0;
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressLabel').textContent = `${doneCount} / ${total}`;

    // Today
    document.getElementById('todayDate').textContent =
      new Date().toLocaleDateString('en-GB', { weekday:'short', day:'numeric', month:'short' });

    // Pending list
    const pl = document.getElementById('choreList');
    pl.innerHTML = '';
    document.getElementById('pendingLabel').textContent =
      pending.length ? `To Do — ${pending.length}` : '';

    pending.forEach(c => pl.appendChild(makeCard(c)));

    // Done list
    const dl = document.getElementById('doneList');
    dl.innerHTML = '';
    const doneLabel = document.getElementById('doneLabel');
    if (done.length) {
      doneLabel.style.display = '';
      doneLabel.textContent = `Completed — ${done.length}`;
      done.forEach(c => dl.appendChild(makeCard(c)));
    } else {
      doneLabel.style.display = 'none';
    }

    document.getElementById('emptyState').classList.toggle('hidden', total > 0);
  }

  function makeCard(c) {
    const div = document.createElement('div');
    div.className = 'chore-card' + (c.done ? ' done' : '');
    div.dataset.id = c.id;

    const overdue = !c.done && isOverdue(c.lastDone);
    const overdueHtml = overdue
      ? `<span class="overdue-badge">overdue</span>` : '';

    div.innerHTML = `
      <div class="chore-icon">${c.icon}</div>
      <div class="chore-info">
        <div class="chore-name">${c.name}${overdueHtml}</div>
        <div class="chore-last">${formatDate(c.lastDone)}</div>
      </div>
      <div class="chore-check">${c.done ? '✓' : ''}</div>
      <button class="chore-delete" title="Delete">✕</button>
    `;

    // Toggle done
    div.addEventListener('click', (e) => {
      if (e.target.closest('.chore-delete')) return;
      const chore = chores.find(x => x.id == div.dataset.id);
      if (!chore) return;
      chore.done = !chore.done;
      if (chore.done) {
        chore.lastDone = Date.now();
        showToast(`✓ ${chore.name} done!`);
      } else {
        showToast(`↩ Marked as undone`);
      }
      save();
      render();
    });

    // Delete
    div.querySelector('.chore-delete').addEventListener('click', (e) => {
      e.stopPropagation();
      if (confirm(`Delete "${c.name}"?`)) {
        chores = chores.filter(x => x.id != c.id);
        save();
        render();
      }
    });

    return div;
  }

  // ─── ADD CHORE ───────────────────────────────────────────────────────
  function addChore() {
    const input = document.getElementById('addInput');
    const name = input.value.trim();
    if (!name) return;
    chores.push({ id: Date.now(), name, icon: randomIcon(), done: false, lastDone: null });
    save();
    render();
    input.value = '';
    input.blur();
    showToast('Chore added!');
  }

  document.getElementById('addBtn').addEventListener('click', addChore);
  document.getElementById('addInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') addChore();
  });

  // ─── PWA INSTALL ─────────────────────────────────────────────────────
  let deferredPrompt = null;
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    document.getElementById('installBanner').classList.remove('hidden');
  });

  document.getElementById('installBtn').addEventListener('click', async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    deferredPrompt = null;
    document.getElementById('installBanner').classList.add('hidden');
    if (outcome === 'accepted') showToast('App installed! 🎉');
  });

  window.addEventListener('appinstalled', () => {
    document.getElementById('installBanner').classList.add('hidden');
    showToast('App installed! 🎉');
  });

  // ─── INIT ─────────────────────────────────────────────────────────────
  render();
</script>
</body>
</html>
