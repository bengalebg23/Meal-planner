name: Deploy

on:
  push:
    branches: [main, dev]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Deploy main to root
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git checkout gh-pages 2>/dev/null || git checkout --orphan gh-pages
          git checkout main -- index.html sw.js
          git add index.html sw.js
          git commit -m "Deploy main" || echo "Nothing to commit"
          git push origin gh-pages --force

      - name: Deploy dev to /dev subfolder
        if: github.ref == 'refs/heads/dev'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git checkout gh-pages 2>/dev/null || git checkout --orphan gh-pages
          git checkout main -- index.html sw.js 2>/dev/null || true
          mkdir -p dev
          git checkout dev -- index.html sw.js
          cp index.html dev/index.html
          cp sw.js dev/sw.js
          git checkout main -- index.html sw.js 2>/dev/null || true
          git add dev/
          git commit -m "Deploy dev" || echo "Nothing to commit"
          git push origin gh-pages --force
